<!DOCTYPE html>
<html>
<head>
<title>Create Tournament</title>

<style>

body{
font-family:Arial;
background:#0c0f24;
color:white;
padding:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#6a00ff;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}

</style>
</head>

<body>

<h2>Create Tournament</h2>

<select id="game">
<option value="freefire">Free Fire</option>
</select>

<input id="mode" placeholder="Mode (CS / Lone Wolf / Full Map)">

<input id="entryFee" type="number" placeholder="Entry Fee">

<input id="prizePool" type="number" placeholder="Prize Pool">

<input id="slots" type="number" placeholder="Total Slots">

<input id="map" placeholder="Map">

<input id="roomId" placeholder="Room ID">

<input id="password" placeholder="Password">

<button onclick="createTournament()">Create Tournament</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBNS_qFwJxl3yD75mWguLS2zESVQ8W6Vbg",
authDomain: "battlezone-c7406.firebaseapp.com",
projectId: "battlezone-c7406",
storageBucket: "battlezone-c7406.firebasestorage.app",
messagingSenderId: "237634131988",
appId: "1:237634131988:web:5ca71576b370b49b2def01"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.createTournament = async function(){

const game = document.getElementById("game").value;
const mode = document.getElementById("mode").value;
const entryFee = Number(document.getElementById("entryFee").value);
const prizePool = Number(document.getElementById("prizePool").value);
const slots = Number(document.getElementById("slots").value);
const map = document.getElementById("map").value;
const roomId = document.getElementById("roomId").value;
const password = document.getElementById("password").value;

await addDoc(collection(db,"tournaments"),{

game:game,
mode:mode,
entryFee:entryFee,
prizePool:prizePool,
slots:slots,
joined:0,
map:map,
roomId:roomId,
password:password,
status:"open"

});

alert("Tournament Created Successfully");

}

</script>

</body>
</html>
