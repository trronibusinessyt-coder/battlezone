<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire Modes</title>

<style>

body{
margin:0;
font-family:Arial;
background:#05081c;
color:white;
}

.topbar{
background:#3b0066;
padding:15px;
font-size:22px;
text-align:center;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:15px;
}

.card{
background:#0f1435;
border-radius:10px;
overflow:hidden;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card p{
margin:10px;
font-weight:bold;
color:#00e5ff;
}

</style>
</head>

<body>

<div class="topbar">
Game Victory
</div>

<div class="grid" id="modeList"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBNS_qFwJxl3yD75mWguLS2zESVQ8W6Vbg",
authDomain: "battlezone-c7406.firebaseapp.com",
projectId: "battlezone-c7406",
storageBucket: "battlezone-c7406.appspot.com",
messagingSenderId: "237634131988",
appId: "1:237634131988:web:5ca71576b370b49b2def01"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const modeList = document.getElementById("modeList");

const snapshot = await getDocs(collection(db,"modes"));

snapshot.forEach((doc)=>{

const data = doc.data();

if(data.game === "freefire" && data.status === "active"){

modeList.innerHTML += `
<div class="card" onclick="openMode('${doc.id}')">
<img src="images/${data.image}">
<p>${data.modeName}</p>
</div>
`;

}

});

window.openMode = function(mode){

window.location.href = "tournament.html?mode="+mode;

}

</script>

</body>
</html>
