<!DOCTYPE html>
<html>
<head>

<title>Free Fire Modes</title>

<style>

body{
background:#070b1a;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#4b0082;
padding:15px;
text-align:center;
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:#141a33;
border-radius:12px;
overflow:hidden;
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<div class="header">
Free Fire Modes
</div>

<div class="grid" id="modeList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBNS_qFwJxl3yD75mWguLS2zESVQ8W6Vbg",
authDomain: "battlezone-c7406.firebaseapp.com",
projectId: "battlezone-c7406",
storageBucket: "battlezone-c7406.firebasestorage.app",
messagingSenderId: "237634131988",
appId: "1:237634131988:web:5ca71576b370b49b2def01"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const snapshot = await getDocs(collection(db,"modes"));

snapshot.forEach(doc=>{

const data = doc.data();

if(data.game === "freefire"){

document.getElementById("modeList").innerHTML += `

<div class="card" onclick="openMode('${data.modeName}')">

<img src="${data.image}">

<h3>${data.modeName}</h3>

</div>

`;

}

});

window.openMode = function(mode){

location.href = "tournaments.html?mode="+mode;

}

</script>

</body>
</html>
