<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Full Map</title>

<link rel="stylesheet" href="style.css">

<style>

.mode-header{
background:#2b0050;
padding:14px;
font-size:20px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
}

.tabs{
display:flex;
justify-content:space-around;
padding:12px;
background:#15002a;
}

.tabs button{
background:none;
border:none;
color:#aaa;
font-size:14px;
font-weight:bold;
}

.tabs button.active{
color:#00e5ff;
border-bottom:2px solid #00e5ff;
padding-bottom:6px;
}

.tournament-card{
background:#200040;
margin:15px;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.banner{
width:100%;
height:150px;
object-fit:cover;
}

.tags{
padding:8px 12px;
}

.tag{
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-right:5px;
}

.solo{
background:#4adede;
color:black;
}

.map{
background:orange;
}

.title{
padding:0 12px;
font-size:16px;
font-weight:bold;
}

.row{
display:flex;
justify-content:space-between;
padding:12px;
border-top:1px solid rgba(255,255,255,0.1);
}

.row div{
font-size:13px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
}

.progress{
height:6px;
background:#444;
border-radius:4px;
margin-top:5px;
overflow:hidden;
width:120px;
}

.fill{
height:6px;
background:#ff6a00;
}

.join{
background:#36d7c9;
border:none;
padding:8px 16px;
border-radius:8px;
font-weight:bold;
}

.full{
background:black;
color:white;
border:none;
padding:8px 16px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="mode-header">
<span onclick="history.back()">←</span>
<span id="modeTitle">FULL MAP</span>
</div>

<div class="tabs">

<button id="tab1" class="active" onclick="loadTournaments('ongoing')">
ONGOING
</button>

<button id="tab2" onclick="loadTournaments('upcoming')">
UPCOMING
</button>

<button id="tab3" onclick="loadTournaments('completed')">
RESULTS
</button>

</div>

<div id="tournamentList"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBNS_qFwJxl3yD75mWguLS2zESVQ8W6Vbg",
authDomain: "battlezone-c7406.firebaseapp.com",
projectId: "battlezone-c7406",
storageBucket: "battlezone-c7406.appspot.com",
messagingSenderId: "237634131988",
appId: "1:237634131988:web:5ca71576b370b49b2def01"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const urlParams = new URLSearchParams(window.location.search);

let team = urlParams.get("mode");

if(team==="fullmapsolo") team="solo";
if(team==="fullmapduo") team="duo";
if(team==="fullmapsquad") team="squad";

const mode = "fullmap";

async function loadTournaments(status){

let html="";

alert("MODE:"+mode+" TEAM:"+team+" STATUS:"+status);

const q=query(
collection(db,"tournaments"),
where("mode","==",mode),
where("team","==",team),
where("status","==",status)
);

const snapshot=await getDocs(q);

snapshot.forEach((doc)=>{

const data=doc.data();

let joined=data.joined || 0;
let slots=data.slots || 48;

let percent=(joined/slots)*100;

let button=joined>=slots
? `<button class="full">MATCH FULL</button>`
: `<button onclick="openTournament('${doc.id}')" class="join">JOIN</button>`;

html+=`

<div class="tournament-card">

<img class="banner" src="images/${data.banner || 'banner.jpg'}">

<div class="tags">
<span class="tag solo">${data.team || 'Solo'}</span>
<span class="tag map">${data.map || 'Bermuda'}</span>
</div>

<div class="title">
${data.title || 'Battle Royale | Solo'}
</div>

<div class="row">

<div>
${data.date || '--'}<br>
${data.time || '--'}
</div>

<div>
PRIZE POOL<br>
🪙 ${data.prize || 0}
</div>

<div>
PER KILL<br>
🪙 ${data.perKill || 0}
</div>

</div>

<div class="bottom">

<div>

${joined}/${slots}

<div class="progress">
<div class="fill" style="width:${percent}%"></div>
</div>

</div>

${button}

</div>

</div>

`;

});

document.getElementById("tournamentList").innerHTML=html;

}

window.openTournament=function(id){

window.location.href="tournament-details.html?id="+id;

}

loadTournaments("upcoming");

</script>

</body>
</html>
