<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleZone Tournaments</title>

<link rel="stylesheet" href="style.css">

<style>

.t-card{
background:#1a0033;
border-radius:12px;
margin:15px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.banner{
width:100%;
height:150px;
object-fit:cover;
}

.t-body{
padding:12px;
}

.tags{
margin-bottom:8px;
}

.tag{
background:#00d2ff;
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-right:5px;
}

.orange{
background:orange;
}

.info{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.slots{
margin-top:10px;
}

.bar{
height:6px;
background:#444;
border-radius:4px;
overflow:hidden;
margin:5px 0;
}

.fill{
height:6px;
background:#ff6a00;
}

.slots button{
background:#00e5ff;
border:none;
padding:8px 14px;
border-radius:8px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="topbar">
<span onclick="history.back()">←</span>
<span id="modeTitle">Tournaments</span>
</div>

<div class="tabs">

<button onclick="loadTournaments('upcoming')" class="active">UPCOMING</button>

<button onclick="loadTournaments('ongoing')">ONGOING</button>

<button onclick="loadTournaments('completed')">RESULTS</button>

</div>

<div id="tournamentList"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBNS_qFwJxl3yD75mWguLS2zESVQ8W6Vbg",
  authDomain: "battlezone-c7406.firebaseapp.com",
  projectId: "battlezone-c7406",
  storageBucket: "battlezone-c7406.firebasestorage.app",
  messagingSenderId: "237634131988",
  appId: "1:237634131988:web:5ca71576b370b49b2def01"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get("mode");

document.getElementById("modeTitle").innerText = mode.toUpperCase();


async function loadTournaments(status){

const q = query(
collection(db,"tournaments"),
where("mode","==",mode),
where("status","==",status)
);

const snapshot = await getDocs(q);

let html = "";

snapshot.forEach(doc => {

const data = doc.data();

html += `
<div class="t-card">

<img class="banner" src="images/banner.jpg">

<div class="t-body">

<div class="tags">
<span class="tag">${data.team}</span>
<span class="tag orange">${data.map}</span>
</div>

<h3>${data.title}</h3>

<div class="info">

<div>
<p>${data.date}</p>
<p>${data.time}</p>
</div>

<div>
<p>PRIZE</p>
<p>₹${data.prize}</p>
</div>

<div>
<p>PER KILL</p>
<p>${data.perKill}</p>
</div>

</div>

<div class="slots">

<span>${data.joined}/${data.slots}</span>

<div class="bar">
<div class="fill" style="width:${(data.joined/data.slots)*100}%"></div>
</div>

<button onclick="openTournament('${doc.id}')">
JOIN
</button>

</div>

</div>
</div>
`;

});

document.getElementById("tournamentList").innerHTML = html;

}


window.loadTournaments = loadTournaments;


loadTournaments("upcoming");


window.openTournament = function(id){

window.location.href = "tournament-details.html?id="+id;

}

</script>

</body>

</html>
