<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleZone Tournaments</title>

<style>

body{
margin:0;
font-family:Arial;
background:#05081c;
color:white;
}

.topbar{
background:#3b0066;
padding:15px;
font-size:20px;
display:flex;
gap:10px;
align-items:center;
}

.tabs{
padding:10px;
}

.tabs button{
margin-right:5px;
padding:6px 10px;
}

.tournament-card{
background:#200040;
margin:15px;
border-radius:12px;
overflow:hidden;
}

.banner{
width:100%;
height:150px;
object-fit:cover;
}

.tags{
padding:8px 12px;
}

.tag{
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-right:5px;
}

.solo{
background:#4adede;
color:black;
}

.map{
background:orange;
}

.title{
padding:0 12px;
font-size:16px;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 12px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
}

.progress{
height:6px;
background:#444;
border-radius:4px;
margin-top:5px;
overflow:hidden;
}

.fill{
height:6px;
background:#ff6a00;
}

.join{
background:#36d7c9;
border:none;
padding:8px 14px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="topbar">
<span onclick="history.back()">←</span>
<span id="modeTitle">Tournaments</span>
</div>

<div class="tabs">
<button onclick="loadTournaments('upcoming')">UPCOMING</button>
<button onclick="loadTournaments('ongoing')">ONGOING</button>
<button onclick="loadTournaments('completed')">RESULTS</button>
</div>

<div id="tournamentList"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyBNS_qFwJxl3yD75mWguLS2zESVQ8W6Vbg",
authDomain: "battlezone-c7406.firebaseapp.com",
projectId: "battlezone-c7406",
storageBucket: "battlezone-c7406.appspot.com",
messagingSenderId: "237634131988",
appId: "1:237634131988:web:5ca71576b370b49b2def01"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get("mode");

const title = mode.replace(/([A-Z])/g,' $1').toUpperCase();
document.getElementById("modeTitle").innerText = title;


async function loadTournaments(status){

let html = "";

const q = query(
collection(db,"tournaments"),
where("mode","==",mode),
where("status","==",status)
);

const snapshot = await getDocs(q);

snapshot.forEach((doc)=>{

const data = doc.data();

html += `
<div class="tournament-card">

<img class="banner" src="images/${data.banner || 'banner.jpg'}">

<div class="tags">
<span class="tag solo">${data.team || 'Solo'}</span>
<span class="tag map">${data.map || 'Bermuda'}</span>
</div>

<h3 class="title">${data.title || 'Battle Royale Match'}</h3>

<div class="row">

<div>
${data.date || '--'}<br>
${data.time || '--'}
</div>

<div>
PRIZE POOL<br>
🪙 ${data.prize || 0}
</div>

<div>
PER KILL<br>
🪙 ${data.perKill || 0}
</div>

</div>

<div class="bottom">

<div>

${data.joined || 0}/${data.slots || 48}

<div class="progress">
<div class="fill" style="width:${((data.joined || 0)/(data.slots || 48))*100}%"></div>
</div>

</div>

<button onclick="openTournament('${doc.id}')" class="join">
JOIN
</button>

</div>

</div>
`;

});

document.getElementById("tournamentList").innerHTML = html;

}

window.openTournament = function(id){
window.location.href = "tournament-details.html?id="+id;
}

loadTournaments("upcoming");

</script>

</body>
</html>
