<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleZone Admin</title>

<link rel="stylesheet" href="style.css">

</head>

<body onload="checkAdmin()">

<div class="topbar">

<h3>BattleZone Admin Panel</h3>

</div>


<h3 class="section-title">Create Tournament</h3>

<div class="card">

<input id="game" placeholder="Game (ff / scar)">

<input id="mode" placeholder="Mode (fullmap / cs / lonewolf)">

<input id="entry" placeholder="Entry Fee">

<input id="prize" placeholder="Prize Pool">

<input id="time" placeholder="Match Time">

<input id="banner" placeholder="Banner Image URL">

<button onclick="createTournament()">Create Tournament</button>

</div>


<h3 class="section-title">Release Room ID</h3>

<div class="card">

<input id="matchId" placeholder="Match ID">

<input id="roomIdInput" placeholder="Room ID">

<input id="passInput" placeholder="Password">

<button onclick="releaseRoom()">Release Room</button>

</div>


<h3 class="section-title">Tournament List</h3>

<div id="adminList"></div>

<script src="admin-auth.js"></script>
<script type="module" src="admin.js"></script>

</body>

</html>
