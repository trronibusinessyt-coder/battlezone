<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BattleZone Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0c0f24;
color:white;
}

/* top bar */

.topbar{
background:#4b0082;
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
}

/* dashboard */

.dashboard{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:#1b1f3a;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card h2{
margin:0;
font-size:22px;
}

.card p{
margin-top:8px;
color:#aaa;
}

/* buttons */

.menu{
padding:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.menu button{
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
background:#6a00ff;
color:white;
}

</style>
</head>

<body>

<div class="topbar">
BattleZone Admin Panel
</div>

<div class="dashboard">

<div class="card">
<h2 id="users">0</h2>
<p>Total Users</p>
</div>

<div class="card">
<h2 id="matches">0</h2>
<p>Total Tournaments</p>
</div>

<div class="card">
<h2 id="joins">0</h2>
<p>Total Joins</p>
</div>

<div class="card">
<h2 id="wallet">₹0</h2>
<p>Total Wallet</p>
</div>

</div>

<div class="menu">

<button onclick="openPage('createTournament')">
Create Tournament
</button>

<button onclick="openPage('manageModes')">
Manage Modes
</button>

<button onclick="openPage('manageGames')">
Manage Games
</button>

<button onclick="openPage('walletControl')">
Wallet Control
</button>

</div>

<script>

function openPage(page){

alert(page + " page open karega (next step me banayenge)");

}

</script>

</body>
</html>
