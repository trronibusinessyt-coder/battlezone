<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BattleZone</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<!-- 🔥 TOP BAR -->
<div class="topbar">
  <div class="logo-box">
    <img src="images/logo.png">
    <div>
      <h2>BattleZone</h2>
      <p>Free Fire Tournaments</p>
    </div>
  </div>

  <div class="top-actions">
    <i class="fa-solid fa-bell"></i>
    <div class="wallet-chip">🪙 4250</div>
  </div>
</div>

<!-- 🔥 MAIN CONTAINER -->
<div class="main-container">

<!-- 🔥 BANNER -->
<div class="banner">
  <h1>GEAR UP.<br> BATTLE HARD.</h1>
  <p>Play tournaments & win coins</p>
</div>

<!-- 🔥 QUICK MENU -->
<div class="quick-menu">
  <div class="q-btn">Join</div>
  <div class="q-btn">Create</div>
  <div class="q-btn">Leaderboard</div>
  <div class="q-btn">Matches</div>
</div>

<!-- 🔥 FEATURED -->
<h3 class="section-title">🔥 Featured</h3>

<div class="cards">

  <div class="card">
    <img src="images/map1.jpg">
    <h3>Battle Royale</h3>
    <p>Entry: 🪙29</p>
    <button>PLAY</button>
  </div>

  <div class="card">
    <img src="images/map2.jpg">
    <h3>Lone Wolf</h3>
    <p>Entry: 🪙9</p>
    <button>PLAY</button>
  </div>

</div>

<!-- 🔥 MY CONTESTS -->
<h3 class="section-title">🔥 My Contests</h3>

<div class="contest-box">

  <div class="contest-card">
    <i class="fa-solid fa-clock"></i>
    <p>Upcoming</p>
  </div>

  <div class="contest-card">
    <i class="fa-solid fa-play"></i>
    <p>Ongoing</p>
  </div>

  <div class="contest-card">
    <i class="fa-solid fa-check"></i>
    <p>Completed</p>
  </div>

</div>

</div>

<!-- 🔥 BOTTOM NAV -->
<div class="bottom-nav">

<a href="#"><i class="fa-solid fa-trophy"></i></a>
<a href="#"><i class="fa-solid fa-ranking-star"></i></a>

<a href="#" class="active">
<i class="fa-solid fa-house"></i>
</a>

<a href="#"><i class="fa-solid fa-wallet"></i></a>
<a href="#"><i class="fa-solid fa-user"></i></a>

</div>

</body>
</html>
