<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleZone Esports</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body onload="loadTournaments()">

<!-- 🔥 LOADING SCREEN -->
<div id="loader">

  <img src="images/logo.png" class="loader-logo">

  <h2 class="loader-text">BattleZone</h2>
  <p class="loader-sub">Loading Arena...</p>

</div>


<!-- 🔥 NEW PRO TOP BAR -->
<div class="topbar-pro">

  <div class="logo-box">
    <img src="images/logo.png" class="logo-img">
    <div>
      <h2>BattleZone</h2>
      <p>Free Fire Tournaments</p>
    </div>
  </div>

  <div class="top-right">

    <div class="online-box">
      🟢 1420
    </div>

    <div class="coin-box">
      🪙 <span id="topBalance">0</span>
    </div>

    <i class="fa-solid fa-bell"></i>

  </div>

</div>


<!-- 🔥 HOT FLASH BAR -->
<div class="hot-flash">
🔥 1,420 Players Online • 245 Live Tournaments • 1 Lakh+ Prize Pools
</div>


<!-- 🔥 MAIN BANNER -->
<div class="main-banner-pro">
  <h1>MEGA CUP</h1>
  <p>🔥 1.5 LAKH PRIZE</p>
  <button>PLAY NOW</button>
</div>


<!-- 🔥 QUICK ACTION -->
<div class="quick-actions">

<a href="support.html" class="quick-btn">
<i class="fa fa-headphones"></i>
<span>Support</span>
</a>

<a href="#" class="quick-btn">
<i class="fa-brands fa-whatsapp"></i>
<span>Whatsapp</span>
</a>

<a href="#" class="quick-btn">
<i class="fa-brands fa-youtube"></i>
<span>Youtube</span>
</a>

<a href="wallet.html" class="quick-btn">
<i class="fa fa-wallet"></i>
<span>Wallet</span>
</a>

</div>


<!-- 🔥 LIVE TOURNAMENT -->
<h3 class="section-title">LIVE TOURNAMENTS</h3>

<div id="tournamentList"></div>


<!-- 🔥 MY CONTEST -->
<div class="contest-section">

  <div class="contest-box upcoming">
    <i class="fa-solid fa-clock"></i>
    <p>Upcoming</p>
  </div>

  <div class="contest-box live">
    <i class="fa-solid fa-play"></i>
    <p>Ongoing</p>
  </div>

  <div class="contest-box completed">
    <i class="fa-solid fa-check"></i>
    <p>Completed</p>
  </div>

</div>


<!-- 🔥 SHARE -->
<div class="share-pro">
  <button>Share App</button>
  <button class="whatsapp">WhatsApp</button>
</div>


<!-- 🔥 BOTTOM NAV -->
<div class="bottom-nav">

<a href="offers.html" class="nav-btn">
<i class="fa-solid fa-percent"></i>
<span>Offers</span>
</a>

<a href="rank.html" class="nav-btn">
<i class="fa-solid fa-ranking-star"></i>
<span>Rank</span>
</a>

<a href="index.html" class="nav-btn active">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="wallet.html" class="nav-btn">
<i class="fa-solid fa-wallet"></i>
<span>Wallet</span>
</a>

<a href="profile.html" class="nav-btn">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</a>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
