<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>
<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
</head>

<body onload="loadWallet()">

<div class="topbar">

<div class="profile">
<img src="https://i.imgur.com/6VBx3io.png">
<div>
<h3 class="profile-name">BattleZone</h3>
<p class="profile-sub">FREE FIRE ESPORTS</p>
</div>
</div>

<div class="top-actions">

<a href="#" class="notify-icon">
<i class="fa-solid fa-bell"></i>
</a>

<a href="support.html" class="support-icon">
<i class="fa-solid fa-headset"></i>
</a>

<div class="wallet-badge">
<i class="fa-solid fa-wallet"></i>
<span id="topBalance">0</span>
</div>

</div>

</div>

<div class="wallet-container">

<!-- BALANCE CARD -->
<div class="wallet-card">
    <p class="wallet-title">TOTAL COINS</p>
    <h1 id="balance">🪙 0</h1>

    <div class="wallet-row">
        <div>
            <p>Deposit</p>
            <h3 id="deposit">🪙 0</h3>
        </div>

        <div>
            <p>Winnings</p>
            <h3 id="winnings">🪙 0</h3>
        </div>
    </div>
</div>

<!-- ACTION BUTTONS -->
<div class="wallet-actions">
    <button class="add-btn" onclick="addMoney()">+ ADD COINS</button>
    <button class="withdraw-btn">⬇ WITHDRAW</button>
</div>

<!-- TRANSACTIONS -->
<h3 class="tx-title">Recent Transactions</h3>

<div id="history" class="tx-list"></div>

</div>

</div>


<div class="bottom-nav">

<a href="offers.html" class="nav-btn">
<i class="fa-solid fa-percent"></i>
<span>Offers</span>
</a>

<a href="rank.html" class="nav-btn">
<i class="fa-solid fa-ranking-star"></i>
<span>Rank</span>
</a>

<a href="index.html" class="nav-btn">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="wallet.html" class="nav-btn active">
<i class="fa-solid fa-wallet"></i>
<span>Wallet</span>
</a>

<a href="profile.html" class="nav-btn">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</a>

</div>

<script src="app.js"></script>

</body>
</html>
