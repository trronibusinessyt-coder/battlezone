<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournaments</title>

<style>

body{
background:#0b0016;
font-family:Arial;
color:white;
margin:0;
}

.header{
background:#1b0033;
padding:15px;
font-size:20px;
font-weight:bold;
}

.tabs{
display:flex;
justify-content:space-around;
background:#1b0033;
padding:10px 0;
}

.tabs span{
color:#aaa;
}

.tabs .active{
color:#00e5ff;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:#140026;
border-radius:12px;
overflow:hidden;
margin-bottom:20px;
}

.card img{
width:100%;
}

.info{
padding:12px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.progress{
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
}

.progress div{
height:6px;
background:#ff7a00;
width:80%;
}

.join{
background:#00e5ff;
color:black;
padding:10px;
border-radius:8px;
text-align:center;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
← FULL MAP
</div>

<div class="tabs">
<span>ONGOING</span>
<span class="active">UPCOMING</span>
<span>RESULTS</span>
</div>

<div class="container">

<div class="card">

<img src="images/fullmap.jpg">

<div class="info">

<div class="title">
BATTLE ROYALE | SOLO
</div>

<div class="row">
<span>26/02/2026<br>09:00 AM</span>
<span>PRIZE 🪙 220</span>
<span>PER KILL 🪙 4</span>
</div>

<div class="progress">
<div></div>
</div>

<div class="join">
8 JOIN
</div>

</div>

</div>

</div>

</body>
</html>
