<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body onload="checkLogin()">

<!-- TOP BAR -->
<div class="topbar">
  <div class="profile">
    <img src="https://i.imgur.com/6VBx3io.png">
    <div>
      <h3 class="profile-name">BattleZone</h3>
      <p class="profile-sub">LEADERBOARD</p>
    </div>
  </div>
</div>

<!-- FILTER -->
<div class="rank-filters">
  <button onclick="setType('weekly')" class="active">Weekly</button>
  <button onclick="setType('monthly')">Monthly</button>
  <button onclick="setType('lifetime')">Lifetime</button>
</div>

<!-- MAP FILTER -->
<div class="map-filters">
  <button onclick="setMap('all')" class="active">All</button>
  <button onclick="setMap('full')">FF FULL MAP</button>
  <button onclick="setMap('survival')">FF SURVIVAL</button>
  <button onclick="setMap('lonewolf')">LONE WOLF</button>
</div>

<!-- TOP 3 -->
<div class="top3">

  <div class="player second" id="rank2"></div>

  <div class="player first" id="rank1"></div>

  <div class="player third" id="rank3"></div>

</div>

<!-- LIST -->
<div id="rankList"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

<a href="offers.html" class="nav-btn">
<i class="fa-solid fa-percent"></i>
<span>Offers</span>
</a>

<a href="rank.html" class="nav-btn active">
<i class="fa-solid fa-ranking-star"></i>
<span>Rank</span>
</a>

<a href="index.html" class="nav-btn">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="wallet.html" class="nav-btn">
<i class="fa-solid fa-wallet"></i>
<span>Wallet</span>
</a>

<a href="profile.html" class="nav-btn">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</a>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
